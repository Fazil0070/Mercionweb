<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon / Logo -->
  <link rel="icon" type="image/png" href="/mercionen.png" />
  <link rel="apple-touch-icon" href="/mercionen.png" />

  <!-- Primary SEO -->
  <title>MERCION — Enterprise Cloud Hosting for Indian Businesses</title>

    content="Mercion cloud delivers lightning-fast, enterprise-grade cloud hosting built natively for Indian businesses. NVMe SSD storage, 99.9% uptime SLA, free SSL, daily backups, and INR billing via Razorpay." />
  <meta name="keywords"
    content="cloud hosting India, web hosting India, NVMe hosting, enterprise hosting, VPS India, Mercion, dedicated server India, cheap hosting India, fast hosting India, INR billing hosting" />
  <meta name="author" content="Mercion Host" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mercioncloud.com/" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mercioncloud.com/" />
  <meta property="og:title" content="MERCION  — Enterprise Cloud Hosting for Indian Businesses" />
  <meta property="og:description"
    content="Built for Performance. Designed for Trust. Lightning-fast NVMe hosting with 99.9% uptime, free SSL, daily backups, and native INR billing." />
  <meta property="og:image" content="https://mercioncloud.com/mercionen.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Mercion Host" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://mercioncloud.com/" />
  <meta name="twitter:title" content="Mercion Host — Enterprise Cloud Hosting for Indian Businesses" />
  <meta name="twitter:description"
    content="Built for Performance. Designed for Trust. Lightning-fast NVMe hosting with 99.9% uptime, free SSL, and native INR billing." />
  <meta name="twitter:image" content="https://mercioncloud.com/mercionen.png" />

  <!-- Theme & App -->
  <meta name="theme-color" content="#E60000" />
  <meta name="application-name" content="Mercion Host" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Mercion Host",
      "url": "https://mercioncloud.com",
      "logo": "https://mercioncloud.com/mercionen.png",
      "description": "Enterprise cloud hosting built for Indian businesses. Lightning-fast NVMe SSD storage, 99.9% uptime SLA, free SSL, and INR billing.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@mercioncloud.com",
        "contactType": "customer support",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://github.com/Fazil0070/Mercionweb"
      ],
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "INR",
        "lowPrice": "179",
        "offerCount": "4"
      }
    }
    </script>

  <!-- Google Fonts Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
